<!doctype html>
<html>
  <head><title>Software Engineer - Lever</title></head>
  <body>
    <form class="application-form">
      <div class="application-field">
        <div class="application-label">Full name *</div>
        <input name="name" required>
      </div>
      <div class="application-field">
        <div class="application-label">Email *</div>
        <input name="email" type="email" required>
      </div>
      <div class="application-field">
        <div class="application-label">Current company</div>
        <input name="org">
      </div>
      <div class="application-field">
        <div class="application-label">Portfolio URL</div>
        <input name="urls[Portfolio]">
      </div>
      <div class="application-field">
        <div class="application-label">Resume</div>
        <input type="file" name="resume">
      </div>
      <div class="application-field">
        <label for="country">Country</label>
        <select id="country" name="cards[eeo][country]">
          <option value="">Select...</option>
          <option value="US">United States</option>
          <option value="CA">Canada</option>
        </select>
      </div>
      <fieldset class="application-question">
        <legend>Will you now or in the future require sponsorship?</legend>
        <label><input type="radio" name="sponsorship" value="Yes"> Yes</label>
        <label><input type="radio" name="sponsorship" value="No"> No</label>
      </fieldset>
      <label><input type="checkbox" name="privacy" required> I agree to the privacy notice</label>
      <button type="button" data-qa="btn-next">Continue</button>
    </form>
  </body>
</html>
